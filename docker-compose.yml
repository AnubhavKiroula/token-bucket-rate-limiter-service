version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  service-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate-limiter-service-1
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=service-1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=secret123
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

  service-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate-limiter-service-2
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=service-2
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=secret123
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
